name: "xray"
description: "Deterministic architecture diffs for pull requests"
author: "kasrakhosravi"

branding:
  icon: "search"
  color: "gray-dark"

inputs:
  github_token:
    description: "GitHub token for posting PR comments"
    required: true
  anthropic_api_key:
    description: "Anthropic API key"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: false
  openrouter_api_key:
    description: "OpenRouter API key"
    required: false
  model:
    description: "Model override (defaults: claude-sonnet-4-20250514 for Anthropic, gpt-4o for OpenAI, anthropic/claude-sonnet-4-20250514 for OpenRouter)"
    required: false
  base_ref:
    description: "Base ref to diff against (defaults to PR base)"
    required: false
  languages:
    description: "Comma-separated language list, or 'auto' to detect"
    required: false
    default: "auto"
  diagram:
    description: "Generate AI-powered Mermaid diagram (set 'false' to skip)"
    required: false
    default: "true"
  min_lines:
    description: "Skip PRs with fewer added lines than this"
    required: false
    default: "50"

runs:
  using: "node20"
  main: "dist/index.js"
